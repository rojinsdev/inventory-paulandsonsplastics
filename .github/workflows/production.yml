name: Production CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install Dependencies
        run: npm ci
        working-directory: server
      - name: Run Tests
        run: npm test
        working-directory: server
        env:
          NODE_ENV: test
          SUPABASE_URL: http://localhost:54321
          SUPABASE_KEY: abcdefghijklmnopqrstuvwx_dummy_key_20_chars

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: Install Dependencies
        run: npm ci
        working-directory: apps/web
      - name: Build (Type Check)
        run: npm run build
        working-directory: apps/web

  deploy-server:
    needs: [test-server, test-web]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Build Server
        run: |
          npm ci
          npm run build
        working-directory: server

      - name: Copy Files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "server/dist,server/package.json,server/package-lock.json"
          target: "/home/ubuntu/paulandsonsplastics/"
          strip_components: 0
          overwrite: true
          timeout: 60s
          debug: true

      - name: Finalize Deployment on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Load NVM environment
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd /home/ubuntu/paulandsonsplastics/server
            # Install production dependencies only (much faster)
            npm ci --omit=dev
            
            # Restart production server
            export NODE_ENV=production
            pm2 restart inventory-server --update-env
            pm2 save

  build-docker-web:
    needs: test-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Web Image
        run: docker build -t inventory-web:${{ github.sha }} ./apps/web
