name: Production CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install Dependencies
        run: npm ci
        working-directory: server
      - name: Run Tests
        run: npm test
        working-directory: server
        env:
          NODE_ENV: test
          SUPABASE_URL: http://localhost:54321
          SUPABASE_KEY: abcdefghijklmnopqrstuvwx_dummy_key_20_chars

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: Install Dependencies
        run: npm ci
        working-directory: apps/web
      - name: Build (Type Check)
        run: npm run build
        working-directory: apps/web

  deploy-server:
    needs: [test-server, test-web]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Server Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/inventory-server:latest
            ghcr.io/${{ github.repository_owner }}/inventory-server:${{ github.sha }}

      - name: Deploy to EC2 via Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USERNAME }}/paulandsonsplastics/server
            
            # Create/Update docker-compose.yml on the fly
            cat <<EOF > docker-compose.yml
            version: '3.8'
            services:
              inventory-server:
                image: ghcr.io/${{ github.repository_owner }}/inventory-server:latest
                container_name: inventory-server
                restart: always
                ports:
                  - "4000:4000"
                env_file:
                  - .env
                environment:
                  - NODE_ENV=production
                logging:
                  driver: "json-file"
                  options:
                    max-size: "10m"
                    max-file: "3"
            EOF

            # Log in to GHCR on the server
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull and Restart
            docker compose pull
            docker compose up -d --remove-orphans
            
            # Cleanup old images
            docker image prune -f

