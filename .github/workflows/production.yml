name: Production CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install Dependencies
        run: npm ci
        working-directory: server
      - name: Run Tests
        run: npm test
        working-directory: server

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: Install Dependencies
        run: npm ci
        working-directory: apps/web
      - name: Lint
        run: npm run lint
        working-directory: apps/web
      - name: Build (Type Check)
        run: npm run build
        working-directory: apps/web

  build-docker-server:
    needs: test-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Server Image
        run: docker build -t inventory-server:${{ github.sha }} ./server

  build-docker-web:
    needs: test-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Web Image
        run: docker build -t inventory-web:${{ github.sha }} ./apps/web
