version: '3.8'

services:
  inventory-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventory-server
    restart: always
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
